<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PAI Voice</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0d0f14);
      --fg: var(--tg-theme-text-color, #e8eaed);
      --hint: var(--tg-theme-hint-color, #8a909a);
      --accent: var(--tg-theme-button-color, #3a7afe);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      background: var(--bg); color: var(--fg);
      font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; padding: 32px; text-align: center;
    }
    h1 { font-size: 22px; font-weight: 600; margin: 0; letter-spacing: 0.5px; }
    #status { color: var(--hint); font-size: 15px; min-height: 20px; }
    #error { color: #ff5a5a; font-size: 14px; min-height: 18px; max-width: 320px; }
    #callBtn {
      width: 132px; height: 132px; border-radius: 50%;
      border: none; cursor: pointer; color: #fff;
      font-size: 18px; font-weight: 600; letter-spacing: 0.5px;
      background: var(--accent);
      box-shadow: 0 8px 30px rgba(58,122,254,0.35);
      transition: background 0.25s ease, box-shadow 0.25s ease, transform 0.1s ease;
    }
    #callBtn:active { transform: scale(0.96); }
    #callBtn.active { background: #ff3b30; box-shadow: 0 8px 30px rgba(255,59,48,0.4); }
    #callBtn.speaking { animation: pulse 1.1s ease-in-out infinite; }
    #callBtn[disabled] { opacity: 0.4; cursor: default; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 30px rgba(255,59,48,0.4); }
      50% { box-shadow: 0 8px 46px rgba(255,59,48,0.85); }
    }
  </style>
</head>
<body>
  <h1>PAI Voice</h1>
  <button id="callBtn">Call</button>
  <div id="status">idle</div>
  <div id="error"></div>

  <script type="module">
    import { Conversation } from 'https://esm.sh/@elevenlabs/client@1.15.1';

    const AGENT_ID = 'agent_8501kxv2sfnkeq9s0r2kqtc2s906';
    const ALLOWED_TG_USER_ID = '8386574938';

    const btn = document.getElementById('callBtn');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');

    let conversation = null;
    let starting = false;

    const setStatus = (t) => { statusEl.textContent = t; };
    const setError = (t) => { errorEl.textContent = t || ''; };

    function resetUI() {
      btn.classList.remove('active', 'speaking');
      btn.textContent = 'Call';
      btn.disabled = false;
    }

    // Telegram init + authorization gate
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
    const tgUserId = String(tg?.initDataUnsafe?.user?.id ?? '');

    if (tgUserId !== ALLOWED_TG_USER_ID) {
      btn.style.display = 'none';
      setStatus('Not authorized.');
    } else {
      btn.addEventListener('click', onTap);
    }

    async function onTap() {
      if (conversation) { await endCall(); return; }
      if (starting) return;
      starting = true;
      setError('');
      btn.disabled = true;

      try {
        setStatus('requesting mic');
        await navigator.mediaDevices.getUserMedia({ audio: true });

        setStatus('connecting');
        conversation = await Conversation.startSession({
          agentId: AGENT_ID,
          connectionType: 'webrtc',
          onConnect: () => {
            btn.disabled = false;
            btn.classList.add('active');
            btn.textContent = 'End';
            setStatus('listening');
          },
          onDisconnect: () => {
            conversation = null;
            resetUI();
            setStatus('ended');
          },
          onError: (err) => {
            setError(typeof err === 'string' ? err : (err?.message || 'Connection error'));
            conversation = null;
            resetUI();
            setStatus('idle');
          },
          onModeChange: ({ mode }) => {
            if (mode === 'speaking') {
              btn.classList.add('speaking');
              setStatus('speaking');
            } else {
              btn.classList.remove('speaking');
              setStatus('listening');
            }
          },
        });
      } catch (err) {
        setError(err?.message || 'Failed to start call');
        conversation = null;
        resetUI();
        setStatus('idle');
      } finally {
        starting = false;
      }
    }

    async function endCall() {
      btn.disabled = true;
      try {
        await conversation.endSession();
      } catch (err) {
        setError(err?.message || 'Failed to end call');
      } finally {
        conversation = null;
        resetUI();
        setStatus('ended');
      }
    }
  </script>
</body>
</html>
